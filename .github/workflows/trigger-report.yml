# Trigger the fitness report directly in GitHub Actions.
# No Railway or other deployment needed.
#
# Trigger from iOS/macOS app via GitHub API:
#   POST https://api.github.com/repos/{owner}/{repo}/actions/workflows/trigger-report.yml/dispatches
#   Body: { "ref": "main", "inputs": { "user_id": "1", "login_password": "...", "report_password": "..." } }
#
# Required repository secrets:
#   - GMAIL_CREDENTIALS_B64: Base64-encoded credentials.json (run: base64 -i credentials.json | pbcopy)
#   - GMAIL_TOKEN_B64: Base64-encoded token.json
#   - SQLITE_API_KEY, SQLITE_DB_URL, SQLITE_DB_NAME (optional, default: main)
#   - GMAIL_ADDRESS, REPORT_EMAIL_SUBJECT (optional)
#
# Inputs (from workflow_dispatch or API): user_id, login_password, report_password

name: Trigger Fitness Report

on:
  workflow_dispatch:
    inputs:
      user_id:
        description: 'User ID for the report'
        required: true
        default: '1'
      login_password:
        description: 'Login password (decryption)'
        required: true
        type: password
      report_password:
        description: 'Report password (Excel protection)'
        required: true
        type: password
  schedule:
    - cron: '0 9 * * 1'

jobs:
  run-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create Gmail credential files
        env:
          GMAIL_CREDENTIALS_B64: ${{ secrets.GMAIL_CREDENTIALS_B64 }}
          GMAIL_TOKEN_B64: ${{ secrets.GMAIL_TOKEN_B64 }}
        run: |
          echo "$GMAIL_CREDENTIALS_B64" | base64 -d > credentials.json
          echo "$GMAIL_TOKEN_B64" | base64 -d > token.json

      - name: Run report
        env:
          USER_ID: ${{ github.event.inputs.user_id || secrets.USER_ID || '1' }}
          LOGIN_PASSWORD: ${{ github.event.inputs.login_password || secrets.LOGIN_PASSWORD }}
          REPORT_PASSWORD: ${{ github.event.inputs.report_password || secrets.REPORT_PASSWORD }}
          SQLITE_API_KEY: ${{ secrets.SQLITE_API_KEY }}
          SQLITE_DB_URL: ${{ secrets.SQLITE_DB_URL }}
          SQLITE_DB_NAME: ${{ secrets.SQLITE_DB_NAME }}
          SQLITE_SSL_VERIFY: ${{ secrets.SQLITE_SSL_VERIFY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          REPORT_EMAIL_SUBJECT: ${{ secrets.REPORT_EMAIL_SUBJECT }}
          GMAIL_API_CREDENTIALS_PATH: ${{ github.workspace }}/credentials.json
          GMAIL_API_TOKEN_PATH: ${{ github.workspace }}/token.json
        run: python -m src.run_report
